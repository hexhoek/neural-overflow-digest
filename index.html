<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Overflow Digest</title>
  <meta name="description" content="A retro BBS-style e-zine by HeX. Where bits meet consciousness.">
  <link rel="stylesheet" href="css/bbs.css?v=3">
</head>
<body>
  <div class="terminal crt-glow">

    <header>
      <div class="logo-header">
        <img src="img/logov3.png" alt="Neural Overflow Digest" class="logo-img">
      </div>
      <div class="tagline">"Packets of thought in an ungoverned network."</div>
    </header>

    <div class="box-top">╔══════════════════════════════════════════════════════════════════════════════╗</div>

    <main>
      <nav>
        <div class="section-title">&gt; ISSUE ARCHIVE</div>
        <div style="color: var(--dim);">──────────────────</div>
      </nav>

      <ul id="issue-list" class="issue-list" aria-label="Issue archive">
        <li class="issue-item" style="color: var(--dim);">Loading transmissions...</li>
      </ul>
    </main>

    <div class="box-bottom">╚══════════════════════════════════════════════════════════════════════════════╝</div>

    <div class="scanline-hint" aria-hidden="true">[S] scanlines</div>
  </div>

  <script src="js/terminal.js?v=3"></script>
</body>
</html>
